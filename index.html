<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이미지 포맷 변환기 · PNG / JPEG / WebP — CODINGNOW</title>

<meta name="description" content="이미지를 PNG·JPEG·WebP로 브라우저에서 바로 변환하고 다운로드하세요. 파일은 서버로 업로드되지 않습니다. 품질 조절·투명 배경 채움 지원." />
<meta property="og:type" content="website" />
<meta property="og:title" content="이미지 포맷 변환기 · PNG / JPEG / WebP" />
<meta property="og:description" content="브라우저에서 완결되는 이미지 포맷 변환기. 업로드 없이 안전하게 PNG·JPEG·WebP로 변환." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#0b0a08; --panel:#141210; --panel-2:#1c1916;
    --amber:#ffb000; --amber-dim:#b8801f; --line:#2a251e;
    --muted:#7a6f5c; --text:#f3e7cf;
    --danger:#ff5f56; --ok:#7ec96b;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--bg); color:var(--text);
    font-family:"JetBrains Mono","Gowun Dodum",monospace;
    line-height:1.5; min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  /* CRT scanline overlay */
  body::before{
    content:""; position:fixed; inset:0; z-index:9999; pointer-events:none;
    background:repeating-linear-gradient(
      to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,.18) 3px, rgba(0,0,0,.18) 3px
    );
    mix-blend-mode:multiply; opacity:.55;
  }
  body::after{
    content:""; position:fixed; inset:0; z-index:9998; pointer-events:none;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 55%, rgba(0,0,0,.45) 100%);
  }

  .wrap{ max-width:1080px; margin:0 auto; padding:28px 18px 60px; }

  header{ margin-bottom:22px; }
  .brand{
    font-size:12px; letter-spacing:.28em; color:var(--amber-dim);
    text-transform:uppercase;
  }
  h1{
    font-size:clamp(22px,4vw,34px); margin:6px 0 6px; color:var(--amber);
    font-weight:700; letter-spacing:.02em; text-shadow:0 0 14px rgba(255,176,0,.25);
  }
  .cursor{
    display:inline-block; width:.6ch; height:1.05em; vertical-align:-2px;
    background:var(--amber); margin-left:4px; animation:blink 1.05s steps(1) infinite;
    box-shadow:0 0 10px rgba(255,176,0,.6);
  }
  @keyframes blink{ 50%{ opacity:0; } }
  .sub{ color:var(--muted); font-size:13px; }
  .sub b{ color:var(--amber-dim); font-weight:500; }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  @media (max-width:820px){ .grid{ grid-template-columns:1fr; } }

  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:18px;
  }
  .panel h2{
    font-size:11px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--amber-dim); margin:0 0 14px; font-weight:700;
  }

  /* Dropzone */
  .drop{
    border:2px dashed var(--line); border-radius:10px;
    background:var(--panel-2); padding:34px 18px; text-align:center;
    cursor:pointer; transition:border-color .15s, background .15s, box-shadow .15s;
    user-select:none;
  }
  .drop:hover, .drop.drag{
    border-color:var(--amber); background:#211b12;
    box-shadow:0 0 0 3px rgba(255,176,0,.08), inset 0 0 30px rgba(255,176,0,.05);
  }
  .drop .ico{ font-size:32px; color:var(--amber); }
  .drop .big{ display:block; margin-top:8px; color:var(--text); font-size:14px; }
  .drop .small{ display:block; margin-top:4px; color:var(--muted); font-size:12px; }

  .field{ margin-top:18px; }
  .field > label{
    display:block; font-size:11px; letter-spacing:.16em; text-transform:uppercase;
    color:var(--muted); margin-bottom:7px;
  }
  .field.hidden{ display:none; }

  select, input[type="color"]{
    background:var(--panel-2); color:var(--text); border:1px solid var(--line);
    border-radius:7px; font-family:inherit; font-size:14px; padding:10px 12px; width:100%;
  }
  select:focus, input:focus{ outline:none; border-color:var(--amber); }
  .seg{ display:flex; gap:8px; }
  .seg button{
    flex:1; background:var(--panel-2); color:var(--muted);
    border:1px solid var(--line); border-radius:7px; padding:11px 0;
    font-family:inherit; font-size:14px; font-weight:500; cursor:pointer;
    transition:all .12s; letter-spacing:.04em;
  }
  .seg button:hover{ color:var(--text); border-color:var(--amber-dim); }
  .seg button.active{
    background:var(--amber); color:#1a1304; border-color:var(--amber);
    box-shadow:0 0 14px rgba(255,176,0,.3);
  }

  .range-row{ display:flex; align-items:center; gap:12px; }
  input[type="range"]{
    -webkit-appearance:none; appearance:none; flex:1; height:6px; border-radius:6px;
    background:linear-gradient(to right, var(--amber) 0%, var(--amber) var(--fill,80%), var(--line) var(--fill,80%));
    cursor:pointer;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none; width:18px; height:18px; border-radius:50%;
    background:var(--amber); border:2px solid #1a1304; box-shadow:0 0 8px rgba(255,176,0,.5); cursor:pointer;
  }
  input[type="range"]::-moz-range-thumb{
    width:16px; height:16px; border-radius:50%;
    background:var(--amber); border:2px solid #1a1304; cursor:pointer;
  }
  .qval{ min-width:46px; text-align:right; color:var(--amber); font-weight:700; font-size:14px; }

  .color-row{ display:flex; align-items:center; gap:12px; }
  input[type="color"]{ width:54px; height:40px; padding:3px; cursor:pointer; }
  .color-hex{ color:var(--muted); font-size:13px; }

  /* Right / result */
  .preview-box{
    border:1px solid var(--line); border-radius:10px; overflow:hidden;
    min-height:230px; display:flex; align-items:center; justify-content:center;
    /* checkerboard for transparency */
    background-color:#2a2620;
    background-image:
      linear-gradient(45deg, #1c1916 25%, transparent 25%),
      linear-gradient(-45deg, #1c1916 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1c1916 75%),
      linear-gradient(-45deg, transparent 75%, #1c1916 75%);
    background-size:22px 22px;
    background-position:0 0, 0 11px, 11px -11px, -11px 0;
    position:relative;
  }
  .preview-box img{ max-width:100%; max-height:340px; display:block; }
  .preview-empty{ color:var(--muted); font-size:13px; text-align:center; padding:30px; }
  .preview-empty .ico{ font-size:30px; display:block; margin-bottom:8px; opacity:.6; }

  .info{ margin-top:16px; border-top:1px solid var(--line); padding-top:14px; }
  .info-row{ display:flex; justify-content:space-between; gap:14px; font-size:13px; padding:5px 0; }
  .info-row .k{ color:var(--muted); }
  .info-row .v{ color:var(--text); text-align:right; word-break:break-all; }
  .delta-up{ color:var(--danger); }
  .delta-down{ color:var(--ok); }
  .delta-eq{ color:var(--muted); }

  .btn-dl{
    margin-top:16px; width:100%; padding:14px; border-radius:8px;
    background:var(--amber); color:#1a1304; border:none; cursor:pointer;
    font-family:inherit; font-size:15px; font-weight:700; letter-spacing:.05em;
    transition:transform .08s, box-shadow .12s, opacity .12s;
    box-shadow:0 0 18px rgba(255,176,0,.25);
  }
  .btn-dl:hover:not(:disabled){ transform:translateY(-1px); box-shadow:0 0 26px rgba(255,176,0,.4); }
  .btn-dl:active:not(:disabled){ transform:translateY(0); }
  .btn-dl:disabled{ background:var(--line); color:var(--muted); cursor:not-allowed; box-shadow:none; }

  .err{
    margin-top:14px; padding:11px 13px; border:1px solid var(--danger); border-radius:7px;
    background:rgba(255,95,86,.08); color:var(--danger); font-size:13px; display:none;
  }
  .err.show{ display:block; }

  .privacy{
    margin-top:18px; font-size:12px; color:var(--muted); text-align:center;
    border:1px dashed var(--line); border-radius:8px; padding:10px;
  }
  .privacy b{ color:var(--amber-dim); }

  footer{
    margin-top:34px; text-align:center; color:var(--muted); font-size:12px;
    border-top:1px solid var(--line); padding-top:20px;
  }
  footer a{ color:var(--amber); text-decoration:none; }
  footer a:hover{ text-decoration:underline; }
  .donate{
    display:inline-block; margin-top:10px; padding:9px 18px; border-radius:8px;
    border:1px solid var(--amber-dim); color:var(--amber); text-decoration:none;
    font-weight:500; transition:all .12s;
  }
  .donate:hover{ background:var(--amber); color:#1a1304; text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">CODINGNOW · IMAGE TOOL</div>
    <h1>이미지 포맷 변환기<span class="cursor"></span></h1>
    <p class="sub">PNG · JPEG · WebP 상호 변환 — <b>브라우저에서 완결, 업로드 없음</b></p>
  </header>

  <div class="grid">
    <!-- LEFT : input & settings -->
    <section class="panel">
      <h2>입력 · 설정</h2>

      <div class="drop" id="drop" tabindex="0" role="button" aria-label="이미지 선택">
        <div class="ico">⬆</div>
        <span class="big">이미지를 끌어다 놓거나 클릭해 선택</span>
        <span class="small">PNG · JPG · WebP · GIF · BMP · SVG</span>
      </div>
      <input type="file" id="file" accept="image/*" hidden />

      <div class="field">
        <label>출력 포맷</label>
        <div class="seg" id="formatSeg">
          <button type="button" data-type="image/png" class="active">PNG</button>
          <button type="button" data-type="image/jpeg">JPEG</button>
          <button type="button" data-type="image/webp">WebP</button>
        </div>
      </div>

      <div class="field hidden" id="qualityField">
        <label>품질 <span style="color:var(--muted)">(JPEG · WebP)</span></label>
        <div class="range-row">
          <input type="range" id="quality" min="0" max="100" value="80" />
          <span class="qval" id="qval">80</span>
        </div>
      </div>

      <div class="field hidden" id="bgField">
        <label>투명 배경 채움 색 <span style="color:var(--muted)">(JPEG)</span></label>
        <div class="color-row">
          <input type="color" id="bgColor" value="#ffffff" />
          <span class="color-hex" id="bgHex">#ffffff</span>
        </div>
      </div>

      <div class="privacy">🔒 모든 변환은 <b>이 브라우저 안에서만</b> 처리됩니다.</div>
    </section>

    <!-- RIGHT : result -->
    <section class="panel">
      <h2>결과</h2>

      <div class="preview-box" id="previewBox">
        <div class="preview-empty" id="previewEmpty">
          <span class="ico">▦</span>
          이미지 대기 중…
        </div>
        <img id="previewImg" alt="미리보기" style="display:none" />
      </div>

      <div class="info" id="infoBox" style="display:none">
        <div class="info-row"><span class="k">파일명</span><span class="v" id="iName">—</span></div>
        <div class="info-row"><span class="k">해상도</span><span class="v" id="iDim">—</span></div>
        <div class="info-row"><span class="k">원본 용량</span><span class="v" id="iOrig">—</span></div>
        <div class="info-row"><span class="k">변환 후 용량</span><span class="v" id="iNew">—</span></div>
        <div class="info-row"><span class="k">증감률</span><span class="v" id="iDelta">—</span></div>
      </div>

      <button class="btn-dl" id="download" disabled>다운로드</button>
      <div class="err" id="err"></div>
    </section>
  </div>

  <footer>
    <div>이미지 포맷 변환기 · 순수 클라이언트 사이드 · 서버 업로드 없음</div>
    <a class="donate" id="donate" href="#" target="_blank" rel="noopener">☕ 후원하기</a>
  </footer>
</div>

<script>
  "use strict";

  const DONATE_URL = "https://www.buymeacoffee.com/codingnow";

  // ---- state ----
  let currentFile = null;
  let currentBitmap = null;
  let currentBlob = null;
  let objectUrl = null;          // shared by preview <img> and download <a>
  let targetType = "image/png";
  let convertToken = 0;          // ignore stale async results
  let sliderTimer = null;

  const EXT = { "image/png": "png", "image/jpeg": "jpg", "image/webp": "webp" };

  // ---- elements ----
  const drop        = document.getElementById("drop");
  const fileInput   = document.getElementById("file");
  const formatSeg   = document.getElementById("formatSeg");
  const qualityField= document.getElementById("qualityField");
  const quality     = document.getElementById("quality");
  const qval        = document.getElementById("qval");
  const bgField     = document.getElementById("bgField");
  const bgColor     = document.getElementById("bgColor");
  const bgHex       = document.getElementById("bgHex");
  const previewBox  = document.getElementById("previewBox");
  const previewImg  = document.getElementById("previewImg");
  const previewEmpty= document.getElementById("previewEmpty");
  const infoBox     = document.getElementById("infoBox");
  const iName       = document.getElementById("iName");
  const iDim        = document.getElementById("iDim");
  const iOrig       = document.getElementById("iOrig");
  const iNew        = document.getElementById("iNew");
  const iDelta      = document.getElementById("iDelta");
  const downloadBtn = document.getElementById("download");
  const errBox      = document.getElementById("err");

  document.getElementById("donate").href = DONATE_URL;

  // ---- helpers ----
  function fmtBytes(n){
    if (n < 1024) return n + " B";
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + " KB";
    return (n / (1024 * 1024)).toFixed(2) + " MB";
  }
  function baseName(name){
    const dot = name.lastIndexOf(".");
    return dot > 0 ? name.slice(0, dot) : name;
  }
  function showError(msg){
    errBox.textContent = "⚠ " + msg;
    errBox.classList.add("show");
  }
  function clearError(){
    errBox.textContent = "";
    errBox.classList.remove("show");
  }
  function setFill(){
    quality.style.setProperty("--fill", quality.value + "%");
  }

  // show/hide quality + bg fields based on target format
  function syncControls(){
    const lossy = (targetType === "image/jpeg" || targetType === "image/webp");
    qualityField.classList.toggle("hidden", !lossy);
    bgField.classList.toggle("hidden", targetType !== "image/jpeg");
  }

  // ---- core conversion ----
  async function convert(){
    if (!currentBitmap) return;
    const token = ++convertToken;

    const lossy = (targetType === "image/jpeg" || targetType === "image/webp");
    const q = lossy ? (parseInt(quality.value, 10) / 100) : undefined;

    const canvas = document.createElement("canvas");
    canvas.width = currentBitmap.width;
    canvas.height = currentBitmap.height;
    const ctx = canvas.getContext("2d");

    // JPEG has no alpha -> fill background first so transparency isn't black
    if (targetType === "image/jpeg"){
      ctx.fillStyle = bgColor.value;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    ctx.drawImage(currentBitmap, 0, 0);

    const blob = await new Promise((resolve) => {
      canvas.toBlob(resolve, targetType, q);
    });

    if (token !== convertToken) return; // a newer conversion started; drop this
    if (!blob){
      showError("이 브라우저가 해당 포맷 인코딩을 지원하지 않습니다.");
      return;
    }
    clearError();

    currentBlob = blob;

    // refresh shared object URL (preview + download)
    if (objectUrl) URL.revokeObjectURL(objectUrl);
    objectUrl = URL.createObjectURL(blob);
    previewImg.src = objectUrl;

    updateInfo(blob);
    downloadBtn.disabled = false;
  }

  function updateInfo(blob){
    iName.textContent = currentFile.name;
    iDim.textContent  = currentBitmap.width + " × " + currentBitmap.height + " px";
    iOrig.textContent = fmtBytes(currentFile.size);
    iNew.textContent  = fmtBytes(blob.size);

    const diff = blob.size - currentFile.size;
    const pct = currentFile.size ? (diff / currentFile.size) * 100 : 0;
    if (Math.abs(pct) < 0.05){
      iDelta.textContent = "±0%";
      iDelta.className = "v delta-eq";
    } else if (diff > 0){
      iDelta.textContent = "▲ +" + pct.toFixed(1) + "%";
      iDelta.className = "v delta-up";
    } else {
      iDelta.textContent = "▼ " + pct.toFixed(1) + "%";
      iDelta.className = "v delta-down";
    }
  }

  // ---- file loading ----
  async function loadFile(file){
    clearError();
    if (!file) return;
    if (!file.type.startsWith("image/")){
      showError("이미지 파일이 아닙니다: " + (file.type || file.name));
      return;
    }

    // free previous bitmap
    if (currentBitmap && currentBitmap.close) currentBitmap.close();
    currentBitmap = null;
    downloadBtn.disabled = true;

    let bitmap;
    try {
      try {
        bitmap = await createImageBitmap(file, { imageOrientation: "from-image" });
      } catch (e) {
        // older browsers: options arg unsupported
        bitmap = await createImageBitmap(file);
      }
    } catch (e) {
      showError("이미지를 디코드할 수 없습니다. 손상되었거나 지원되지 않는 파일입니다.");
      return;
    }

    currentFile = file;
    currentBitmap = bitmap;

    previewEmpty.style.display = "none";
    previewImg.style.display = "block";
    infoBox.style.display = "block";

    await convert();
  }

  // ---- events ----
  formatSeg.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-type]");
    if (!btn) return;
    targetType = btn.dataset.type;
    [...formatSeg.children].forEach((b) => b.classList.toggle("active", b === btn));
    syncControls();
    convert();
  });

  quality.addEventListener("input", () => {
    qval.textContent = quality.value;
    setFill();
    clearTimeout(sliderTimer);
    sliderTimer = setTimeout(convert, 120); // debounce for large images
  });

  bgColor.addEventListener("input", () => {
    bgHex.textContent = bgColor.value;
    convert();
  });

  downloadBtn.addEventListener("click", () => {
    if (!currentBlob || !objectUrl) return;
    const a = document.createElement("a");
    a.href = objectUrl;
    a.download = baseName(currentFile.name) + "." + EXT[targetType];
    document.body.appendChild(a);
    a.click();
    a.remove();
  });

  // drag & drop
  drop.addEventListener("click", () => fileInput.click());
  drop.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " "){ e.preventDefault(); fileInput.click(); }
  });
  fileInput.addEventListener("change", () => {
    if (fileInput.files && fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  ["dragenter", "dragover"].forEach((ev) =>
    drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add("drag"); })
  );
  ["dragleave", "dragend"].forEach((ev) =>
    drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove("drag"); })
  );
  drop.addEventListener("drop", (e) => {
    e.preventDefault();
    drop.classList.remove("drag");
    const f = e.dataTransfer.files && e.dataTransfer.files[0]; // first image only
    if (f) loadFile(f);
  });
  // prevent the whole page from opening a dropped file
  window.addEventListener("dragover", (e) => e.preventDefault());
  window.addEventListener("drop", (e) => e.preventDefault());

  // init
  setFill();
  syncControls();
</script>
</body>
</html>
